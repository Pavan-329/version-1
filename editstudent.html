<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <a href="/addstudent.html">Add Student</a>
                <a href="/viewstudents.html">View Students</a>
                <a href="/index.html">Logout</a>
            </nav>
        </header>
        <main>
            <h3>Edit Student</h3>
            <form action="./viewstudents.html">
                <label for="rollNumber">Enter the Roll Number :</label>
                <input type="text" required>
                <label for="name">Enter the Name :</label>
                <input type="text" required>
                <label for="branch">Enter the Branch:</label>
                <input type="text" required>
                <label for="cgpa">Enter the CGPA:</label>
                <input type="number" required>
                <button type="submit">Edit Student</button>
            </form>
        </main>
    </div>
</body>
</html>
